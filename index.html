<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {

  .rates-row { display: flex; gap: 5px; flex-wrap: wrap; }

  .chip {

  .install-btn {

  }
  .dismiss-btn {

    padding: 4px;

  .install-close {

  .field-info { flex: 1; min-width: 0; }

  .currency-label {
    font-size: 11px;

  .field-info input {
    font-size: 32px;

    color: var(--text);

    border: none;
    outline: none;
    width: 100%;
    font-family: inherit;
    letter-spacing: -0.5px;
    caret-color: var(--accent);
    line-height: 1.1;

  .field-info input::placeholder { color: rgba(255,255,255,0.15); }

  /* Copy icon button */
  .copy-btn {
    background: none;
    border: none;
    padding: 6px;
    color: var(--muted);
    cursor: pointer;
    flex-shrink: 0;
    align-self: flex-start;
    border-radius: 6px;
    position: relative;
    transition: color 0.1s;
  }
  .copy-btn:active { color: var(--text); }
  .copy-btn svg { display: block; width: 16px; height: 16px; }

  .copy-tooltip {
    position: absolute;
    top: calc(100% + 6px);
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 11px;
    color: var(--accent);
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-4px);
    transition: opacity 0.15s, transform 0.15s;
  }
  .copy-btn.copied .copy-tooltip {
    opacity: 1;
    transform: translateY(0);
  }
  .copy-btn.copied svg { color: var(--accent); }

  /* Quick amounts */
  .field-quick {
    display: flex;
    gap: 5px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .quick-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 5px 13px;
    font-size: 11px;
    color: var(--muted);
    font-family: inherit;
    cursor: pointer;
    transition: background 0.1s, color 0.1s, border-color 0.1s;
    white-space: nowrap;
  }
  .quick-btn:active, .quick-btn.sel {
    background: var(--accent);
    color: var(--accent-dark);
    border-color: var(--accent);
  }

  @media (min-width: 600px) {
    .fields { flex-direction: row; align-items: flex-start; }
    .field { flex: 1; }
    .field-info input { font-size: 36px; }
    .flag { font-size: 28px; }
  }

  .bottom {
    padding: 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    margin-top: auto;

  .refresh-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 14px;

    color: var(--muted);

    font-family: inherit;

    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, color 0.15s;
  }
  .refresh-btn:active { background: var(--surface); color: var(--text); }

  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .status-dot.loading { background: var(--muted); animation: pulse 1s infinite; }
  .status-dot.error { background: #ff5c5c; }

  .footer-note {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 10px;
    opacity: 0.5;
    line-height: 1.5;
  }
  .footer-note a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>

<body>

  <div class="rates-row">

  <p class="footer-note">Сделано для личного использования. Нужен похожий инструмент или&nbsp;хочешь обсудить сотрудничество — <a href="https://t.me/alex_capetown" target="_blank">Напиши&nbsp;в&nbsp;Телеграм</a></p>

<script>
let rates = null;
let active = 'usd';

const inputs = {
  usd: document.getElementById('input-usd'),
  zar: document.getElementById('input-zar'),
  rub: document.getElementById('input-rub'),
};

function fmt(n) {
  if (isNaN(n) || n === null) return '';
  if (n >= 1) {
    const parts = n.toFixed(2).split('.');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    return parts.join('.');
  }
  return n.toFixed(4);
}

function parseVal(str) {
  if (!str) return NaN;
  return parseFloat(str.replace(/\s/g, '').replace(',', '.'));
}

function convert(source, rawValue) {
  if (!rates) return;
  const v = parseVal(rawValue);
  if (rawValue === '' || isNaN(v) || v < 0) {
    Object.keys(inputs).forEach(k => { if (k !== source) inputs[k].value = ''; });
    return;
  }
  const usd = source === 'usd' ? v : source === 'zar' ? v / rates.zar : v / rates.rub;
  Object.keys(inputs).forEach(k => {
    if (k === source) return;
    inputs[k].value = fmt(k === 'usd' ? usd : k === 'zar' ? usd * rates.zar : usd * rates.rub);
  });
}

function formatInput(input) {
  const raw = input.value.replace(/\s/g, '');
  const sepIdx = raw.search(/[.,]/);
  let intPart = sepIdx !== -1 ? raw.slice(0, sepIdx) : raw;
  let decPart = sepIdx !== -1 ? raw.slice(sepIdx) : '';
  const formatted = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + decPart;
  if (formatted !== input.value) {
    const pos = input.selectionStart + (formatted.length - input.value.length);
    input.value = formatted;
    try { input.setSelectionRange(pos, pos); } catch {}
  }
}

const allQuickBtns = document.querySelectorAll('.quick-btn');

function clearQuickBtns() { allQuickBtns.forEach(b => b.classList.remove('sel')); }

Object.keys(inputs).forEach(key => {
  inputs[key].addEventListener('focus', () => active = key);
  inputs[key].addEventListener('keydown', e => {
    const allowed = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab','Home','End'];
    if (allowed.includes(e.key)) return;
    if (/^[0-9.,]$/.test(e.key)) return;
    e.preventDefault();
  });
  let timer;
  inputs[key].addEventListener('input', e => {
    const cleaned = e.target.value.replace(/[^0-9.,]/g, '');
    if (cleaned !== e.target.value) e.target.value = cleaned;
    formatInput(e.target);
    clearQuickBtns();
    active = key;
    clearTimeout(timer);
    timer = setTimeout(() => convert(key, e.target.value), 80);
  });
});

allQuickBtns.forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const key = btn.dataset.key;
    const val = btn.dataset.val;
    inputs[key].value = fmt(parseFloat(val));
    active = key;
    convert(key, val);
    clearQuickBtns();
    btn.classList.add('sel');
  });
});

// Copy buttons с тултипом
document.querySelectorAll('.copy-btn').forEach(btn => {
  btn.addEventListener('click', e => {
    e.stopPropagation();
    const val = document.getElementById(btn.dataset.for).value;
    if (!val) return;
    navigator.clipboard.writeText(val).then(() => {
      btn.classList.add('copied');
      setTimeout(() => btn.classList.remove('copied'), 1500);
    });
  });
});

const dot = document.getElementById('status-dot');
const label = document.getElementById('refresh-label');

async function fetchRates() {
  dot.className = 'status-dot loading';
  label.textContent = 'Обновляем…';
  try {
    const URLS = [
      'https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json',
      'https://latest.currency-api.pages.dev/v1/currencies/usd.min.json',
    ];
    let data = null;
    for (const url of URLS) {
      try { const r = await fetch(url); if (r.ok) { data = await r.json(); break; } } catch {}
    }
    if (!data) throw new Error('no data');
    rates = { zar: data.usd.zar, rub: data.usd.rub };

    document.getElementById('chip-usd-zar').textContent = '1 USD = ' + fmt(rates.zar) + ' ZAR';
    document.getElementById('chip-usd-rub').textContent = '1 USD = ' + fmt(rates.rub) + ' RUB';
    document.getElementById('chip-zar-rub').textContent = '1 ZAR = ' + fmt(rates.rub / rates.zar) + ' RUB';

    const now = new Date();
    const time = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
    dot.className = 'status-dot';
    label.textContent = 'Курс актуален ' + time + ' · нажми для обновления';

    try { localStorage.setItem('rates_cache', JSON.stringify({ rates, ts: Date.now() })); } catch {}
    if (active && inputs[active].value) convert(active, inputs[active].value);
  } catch {
    dot.className = 'status-dot error';
    label.textContent = 'Ошибка загрузки · нажми повторить';
    try {
      const c = JSON.parse(localStorage.getItem('rates_cache'));
      if (c && c.rates) {
        rates = c.rates;
        const d = new Date(c.ts);
        const time = d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        label.textContent = 'Кэш от ' + d.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit' }) + ' ' + time;
        document.getElementById('chip-usd-zar').textContent = '1 USD = ' + fmt(rates.zar) + ' ZAR';
        document.getElementById('chip-usd-rub').textContent = '1 USD = ' + fmt(rates.rub) + ' RUB';
        document.getElementById('chip-zar-rub').textContent = '1 ZAR = ' + fmt(rates.rub / rates.zar) + ' RUB';
      }
    } catch {}
  }
}

document.getElementById('refresh-btn').addEventListener('click', fetchRates);

let deferredPrompt = null;

// Показываем баннер только если пользователь не скрыл его
function showInstallBanner() {
  if (localStorage.getItem('install_banner_dismissed') === '1') return;
  document.getElementById('install-banner').classList.add('visible');
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

document.getElementById('dismiss-btn').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('visible');
  try { localStorage.setItem('install_banner_dismissed', '1'); } catch {}
});

document.getElementById('install-btn').addEventListener('click', async () => {
  if (!deferredPrompt) {
    alert('Safari → кнопка «Поделиться» → «На экран "Домой"»\nChrome → меню ⋮ → «Установить приложение»');
    return;
  }
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') {
    document.getElementById('install-banner').classList.remove('visible');
    try { localStorage.setItem('install_banner_dismissed', '1'); } catch {}
  }
  deferredPrompt = null;
});

if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'conv-v4';
    self.addEventListener('install', e => {
      e.waitUntil(caches.open(CACHE).then(c => c.addAll([self.location.pathname])));
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      if (e.request.url.includes('currency-api') || e.request.url.includes('jsdelivr')) return;
      e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(() => {});
}

fetchRates();
</script>
